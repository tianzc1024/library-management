# ==============================================
# 测试环境配置
# 由 @ActiveProfiles("test") 自动激活
# ==============================================

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:library_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

jwt:
  secret: test-jwt-secret-for-unit-tests-only

cors:
  allowed-origins: http://localhost:8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
